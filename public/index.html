<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seday ERP - Final Master 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: Cairo, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        #sidebar { width: 60px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; white-space: nowrap; }
        @media (min-width: 1024px) { #sidebar:hover { width: 240px; } #sidebar:hover .nav-text { opacity: 1; display: inline; } }
        @media (max-width: 1023px) {
            #sidebar { width: 100% !important; height: 70px !important; flex-direction: row !important; bottom: 0 !important; top: auto !important; right: 0 !important; left: 0 !important; justify-content: space-around; padding: 0 10px; border-top: 2px solid #1e293b; background: #0f172a; }
            #sidebar .nav-text, .logo-area { display: none !important; }
            #sidebar nav { flex-direction: row !important; display: flex; width: 100%; justify-content: space-around; align-items: center; }
            main { margin-right: 0 !important; padding-bottom: 100px !important; width: 100vw; }
        }
        .nav-text { opacity: 0; transition: opacity 0.3s; display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select { border: 1px solid #e2e8f0 !important; transition: all 0.2s; }
        input:focus, select:focus { border-color: #4f46e5 !important; }
    </style>
</head>
<body class="bg-slate-50 flex min-h-screen text-right">

    <div id="login-view" class="fixed inset-0 bg-slate-900 z-[300] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl animate-fade-in text-center border-t-8 border-indigo-600">
            <div class="w-16 h-16 bg-indigo-600 text-white rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg rotate-3"><i class="fas fa-bolt"></i></div>
            <h2 class="text-3xl font-black text-slate-800 mb-1">SEDAY ERP</h2>
            <p class="text-slate-400 text-sm mb-6 font-bold italic">Security Control 2026 ⚡</p>
            <div class="space-y-3">
                <select id="auth-role" onchange="toggleMasterArea()" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-center border">
                    <option value="user">شركة / عميل (Client)</option>
                    <option value="admin">مدير النظام (Admin)</option>
                </select>
                <input type="text" id="auth-name" placeholder="اسم الشركة" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-center border">
                <input type="email" id="auth-email" placeholder="البريد الإلكتروني" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-center border">
                <div id="master-key-area" class="hidden animate-fade-in">
                    <input type="password" id="master-password" placeholder="كود تفعيل المطور" class="w-full p-4 bg-rose-50 rounded-2xl outline-none font-bold text-center border-rose-300">
                </div>
                <input type="password" id="auth-pass" placeholder="كلمة المرور" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold text-center border">
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="handleLogin(event)" id="login-btn" class="bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-xl">دخول 🔒</button>
                    <button onclick="handleRegister(event)" id="reg-btn" class="bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-xl">تسجيل ✅</button>
                </div>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="bg-slate-900 text-white fixed h-full right-0 top-0 z-[100] flex flex-col shadow-2xl hidden">
        <div class="logo-area p-6 mb-10 text-indigo-400 font-black text-2xl border-b border-slate-800 hidden lg:block text-center">
            <i class="fas fa-bolt"></i> <span class="nav-text italic uppercase mr-2">SEDAY</span>
        </div>
        <nav class="flex-1">
            <div onclick="showDash()" class="p-5 hover:bg-indigo-600 flex items-center cursor-pointer transition"><i class="fas fa-home lg:ml-4 text-xl"></i> <span class="nav-text">الرئيسية</span></div>
            <div onclick="showHR()" class="p-5 hover:bg-indigo-600 flex items-center cursor-pointer transition"><i class="fas fa-users lg:ml-4 text-xl"></i> <span class="nav-text">الموظفين</span></div>
            <div onclick="showCalc()" class="p-5 hover:bg-emerald-600 flex items-center cursor-pointer transition text-emerald-400"><i class="fas fa-magic lg:ml-4 text-xl"></i> <span class="nav-text">Net to Gross</span></div>
            <div onclick="handleLogout()" class="p-5 hover:bg-rose-600 flex items-center cursor-pointer transition text-rose-400 mt-auto"><i class="fas fa-power-off lg:ml-4 text-xl"></i> <span class="nav-text">خروج</span></div>
        </nav>
    </aside>

    <main id="main-content" class="flex-1 lg:mr-[60px] p-4 md:p-8 transition-all hidden">
        
        <div id="dashboard-view" class="animate-fade-in">
            <header class="mb-10">
                <h1 class="text-3xl md:text-5xl font-black text-slate-800 italic">أهلاً <span class="text-indigo-600">يا شهاب!</span></h1>
                <p class="text-slate-400 font-bold mt-2">نظام Seday ERP المتكامل - 2026</p>
            </header>
        </div>

        <div id="list-view" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-black text-slate-800">قائمة الموظفين</h1>
                <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black shadow-lg">إضافة موظف</button>
            </div>
            <div class="bg-white border rounded-2xl shadow-sm overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 border-b">
                        <tr><th class="p-5">الاسم</th><th class="p-5 text-center">الرقم القومي</th><th class="p-5 text-center">الحالة</th></tr>
                    </thead>
                    <tbody id="empTable" class="divide-y divide-slate-100 font-bold"></tbody>
                </table>
            </div>
        </div>

        <div id="profile-view" class="hidden animate-fade-in">
             <button onclick="showHR()" class="text-indigo-600 font-black mb-4">← عودة للقائمة</button>
             <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <h2 id="p-name" class="text-2xl font-black text-indigo-600 mb-4"></h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div><label class="text-xs text-slate-400">الراتب الأساسي</label><input type="number" id="c-fbasic" class="w-full p-3 bg-slate-50 rounded-lg border font-bold"></div>
                    <div><label class="text-xs text-slate-400">أيام العمل</label><input type="number" id="c-days" value="30" class="w-full p-3 bg-slate-50 rounded-lg border font-bold"></div>
                    <div><label class="text-xs text-slate-400">الإضافات</label><input type="number" id="c-additions" value="0" class="w-full p-3 bg-emerald-50 rounded-lg border font-bold text-emerald-600"></div>
                    <div><label class="text-xs text-slate-400">الخصومات</label><input type="number" id="c-deductions" value="0" class="w-full p-3 bg-rose-50 rounded-lg border font-bold text-rose-600"></div>
                </div>
                <div class="mb-6"><label class="text-xs text-slate-400">شهر الحساب</label><input type="month" id="c-month" class="w-full p-3 bg-indigo-50 rounded-lg border font-bold"></div>
                <button onclick="runCalc()" id="run-btn" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-black shadow-lg">حساب الراتب الآن ⚡</button>
             </div>
             <div class="mt-8 bg-white border rounded-2xl overflow-x-auto">
                <table class="w-full text-xs text-center">
                    <thead class="bg-slate-900 text-white">
                        <tr><th class="p-3">الشهر</th><th class="p-3">الإجمالي</th><th class="p-3">تأمينات</th><th class="p-3">ضرائب</th><th class="p-3">الصافي</th></tr>
                    </thead>
                    <tbody id="histBody" class="divide-y font-bold"></tbody>
                </table>
             </div>
        </div>

        <div id="calc-view" class="hidden animate-fade-in">
            <h1 class="text-3xl font-black mb-8">المحول الذكي 💸</h1>
            <div class="bg-white p-8 rounded-3xl border shadow-sm max-w-xl mx-auto">
                <select id="ntg-emp-id" class="w-full p-4 mb-4 bg-slate-50 border rounded-xl font-bold"></select>
                <input type="number" id="ntg-target" placeholder="الصافي المطلوب (مثال: 15000)" class="w-full p-4 mb-4 bg-emerald-50 border rounded-xl font-bold text-xl">
                <button onclick="runNetToGross()" id="ntg-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black">احسب الـ Gross 🚀</button>
                <div id="ntg-result" class="hidden mt-6 p-4 bg-slate-900 text-white rounded-xl text-center">
                    <p class="text-slate-400">الراتب الإجمالي المطلـوب:</p>
                    <p id="ntg-gross-val" class="text-3xl font-black text-emerald-400"></p>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-[200] p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-md shadow-2xl animate-fade-in">
            <h3 class="text-xl font-black mb-6 text-center">بيانات الموظف الجديد</h3>
            <div class="space-y-4">
                <input type="text" id="n-name" placeholder="اسم الموظف" class="w-full p-4 bg-slate-50 rounded-xl font-bold border">
                <input type="text" id="n-nid" placeholder="الرقم القومي (14 رقم)" class="w-full p-4 bg-slate-50 rounded-xl font-bold border">
                <input type="number" id="n-ins" placeholder="أجر التأمين الاجتماعي" class="w-full p-4 bg-slate-50 rounded-xl font-bold border">
                <input type="date" id="n-hire" class="w-full p-4 bg-indigo-50 rounded-xl font-bold border">
            </div>
            <div class="flex gap-4 mt-8">
                <button id="save-btn" onclick="saveEmp()" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-black">حفظ الموظف</button>
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 bg-slate-100 text-slate-400 py-4 rounded-xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <input type="hidden" id="currId">

    <script>
        const API_BASE = '/api';
        const MASTER_SECRET = "SHEHAB_2026_ERP";
        let TOKEN = localStorage.getItem('token');

        // --- AUTH ---
        function toggleMasterArea() {
            const role = document.getElementById('auth-role').value;
            document.getElementById('master-key-area').classList.toggle('hidden', role !== 'admin');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            const role = document.getElementById('auth-role').value;
            
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role })
                });
                const data = await res.json();
                if(data.token) {
                    localStorage.setItem('token', data.token);
                    location.reload();
                } else { alert("بيانات الدخول غلط يا شهاب!"); }
            } catch(err) { alert("السيرفر مش بيرد!"); }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('auth-name').value,
                email: document.getElementById('auth-email').value,
                password: document.getElementById('auth-pass').value,
                role: document.getElementById('auth-role').value
            };
            if(payload.role === 'admin' && document.getElementById('master-password').value !== MASTER_SECRET) return alert("كود المطور غلط!");

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) alert("تم التسجيل! ادخل بقى"); else alert("فيه مشكلة في التسجيل");
            } catch(err) { alert("السيرفر واقع"); }
        }

        // --- CORE API FETCH (The Heart) ---
        async function apiFetch(url, options = {}) {
            const headers = { 
                'Authorization': `Bearer ${TOKEN}`, 
                'Content-Type': 'application/json' 
            };
            try {
                const res = await fetch(`${API_BASE}${url}`, { ...options, headers });
                if(res.status === 401) { localStorage.removeItem('token'); location.reload(); return; }
                return await res.json();
            } catch (err) {
                console.error("Fetch Error:", err);
                throw err;
            }
        }

        // --- NAVIGATION ---
        function hideAll() { 
            ['dashboard-view', 'list-view', 'profile-view', 'calc-view'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
        }
        function showDash() { hideAll(); document.getElementById('dashboard-view').classList.remove('hidden'); }
        function showHR() { hideAll(); document.getElementById('list-view').classList.remove('hidden'); loadEmployees(); }
        function showCalc() { 
            hideAll(); 
            document.getElementById('calc-view').classList.remove('hidden'); 
            loadEmployeesForSelect();
        }
        function handleLogout() { localStorage.removeItem('token'); location.reload(); }

        // --- EMPLOYEES ---
        async function loadEmployees() {
            const data = await apiFetch('/employees');
            const tbody = document.getElementById('empTable');
            if(!data) return;
            tbody.innerHTML = data.map(e => `
                <tr class="hover:bg-indigo-50 cursor-pointer transition" onclick="openProfile('${e.id}')">
                    <td class="p-5">${e.name}</td>
                    <td class="p-5 text-center font-mono">${e.nationalId}</td>
                    <td class="p-5 text-center">${e.status === 'Active' ? '✅ نشط' : '🛑 مستقيل'}</td>
                </tr>
            `).join('');
        }

        async function saveEmp() {
            const btn = document.getElementById('save-btn');
            const payload = {
                name: document.getElementById('n-name').value,
                nationalId: document.getElementById('n-nid').value,
                hiringDate: document.getElementById('n-hire').value,
                salaryDetails: { basicSalary: Number(document.getElementById('n-ins').value) }
            };

            if(!payload.name || !payload.nationalId) return alert("دخل الاسم والبطاقة!");

            btn.disabled = true; btn.innerText = "جاري الحفظ...";

            try {
                const res = await apiFetch('/employees', { method: 'POST', body: JSON.stringify(payload) });
                if(res) {
                    alert("تم الحفظ بنجاح! ✅");
                    document.getElementById('modal').classList.add('hidden');
                    loadEmployees();
                }
            } catch(err) { alert("فشل في الحفظ!"); }
            finally { btn.disabled = false; btn.innerText = "حفظ الموظف"; }
        }

        async function openProfile(id) {
            hideAll();
            document.getElementById('profile-view').classList.remove('hidden');
            document.getElementById('currId').value = id;
            const data = await apiFetch(`/employees/${id}/details`);
            if(!data) return;
            
            document.getElementById('p-name').innerText = data.emp.name;
            document.getElementById('c-fbasic').value = data.emp.salaryDetails.basicSalary;
            document.getElementById('c-month').value = new Date().toISOString().substring(0, 7);

            document.getElementById('histBody').innerHTML = (data.history || []).map(r => `
                <tr>
                    <td class="p-3">${r.month}</td>
                    <td class="p-3">${r.payload.grossSalary.toLocaleString()}</td>
                    <td class="p-3 text-rose-500">${r.payload.insuranceEmployee.toLocaleString()}</td>
                    <td class="p-3 text-rose-600">${r.payload.taxAmount.toLocaleString()}</td>
                    <td class="p-3 bg-emerald-50 text-emerald-700">${r.payload.netSalary.toLocaleString()} EGP</td>
                </tr>
            `).join('');
        }

        async function runCalc() {
            const btn = document.getElementById('run-btn');
            const payload = {
                empId: document.getElementById('currId').value,
                month: document.getElementById('c-month').value,
                fullBasic: Number(document.getElementById('c-fbasic').value),
                days: Number(document.getElementById('c-days').value),
                additions: Number(document.getElementById('c-additions').value),
                deductions: Number(document.getElementById('c-deductions').value)
            };
            btn.disabled = true;
            const res = await apiFetch('/payroll/calculate', { method: 'POST', body: JSON.stringify(payload) });
            if(res.success) { alert("تم حساب الراتب! 💸"); openProfile(payload.empId); }
            btn.disabled = false;
        }

        async function loadEmployeesForSelect() {
            const data = await apiFetch('/employees');
            document.getElementById('ntg-emp-id').innerHTML = data.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
        }

        async function runNetToGross() {
            const target = Number(document.getElementById('ntg-target').value);
            const empId = document.getElementById('ntg-emp-id').value;
            const res = await apiFetch('/payroll/net-to-gross', { method: 'POST', body: JSON.stringify({ targetNet: target, empId }) });
            if(res.success) {
                document.getElementById('ntg-result').classList.remove('hidden');
                document.getElementById('ntg-gross-val').innerText = res.result.fullBasic.toLocaleString() + " EGP";
            }
        }

        window.onload = () => {
            if(TOKEN) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('sidebar').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                showDash();
            }
        };
    </script>
</body>
</html>
