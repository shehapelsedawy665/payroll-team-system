<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Payroll Pro — نظام الموارد البشرية المصري</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="loading-overlay" id="loading"><div class="spinner"></div></div>
    <div class="toast-container" id="toasts"></div>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">🏢</div>
                <h1>Payroll Pro</h1>
                <p>نظام الموارد البشرية المصري — 2026</p>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">تسجيل الدخول</button>
                <button class="auth-tab" onclick="switchAuthTab('signup')">إنشاء حساب</button>
            </div>
            <div id="login-form">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="login-email" placeholder="example@company.com"/>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()"/>
                </div>
                <button class="btn-primary" onclick="doLogin()">دخول ←</button>
            </div>
            <div id="signup-form" style="display:none">
                <div class="form-group">
                    <label>اسم الشركة</label>
                    <input type="text" id="reg-company" placeholder="شركة المستقبل"/>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="reg-email" placeholder="admin@company.com"/>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="reg-password" placeholder="8+ أحرف"/>
                </div>
                <button class="btn-primary" onclick="doSignup()">إنشاء حساب مجاني ✓</button>
            </div>
            <div class="auth-error" id="auth-error"></div>
        </div>
    </div>

    <div id="app">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">🏢</div>
                <div>
                    <div class="logo-text">Payroll Pro</div>
                    <div class="logo-sub" id="company-name-sidebar">نظام HR</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">الرئيسية</div>
                <div class="nav-item active" onclick="navigate('dashboard')"><span class="nav-icon">📊</span> لوحة التحكم</div>
                <div class="nav-section-label">الموظفين</div>
                <div class="nav-item" onclick="navigate('employees')"><span class="nav-icon">👥</span> إدارة الموظفين</div>
                <div class="nav-item" onclick="navigate('attendance')"><span class="nav-icon">📅</span> الحضور والغياب</div>
                <div class="nav-item" onclick="navigate('leaves')">
                    <span class="nav-icon">🌴</span> الإجازات
                    <span class="nav-badge" id="pending-leaves-badge" style="display:none">0</span>
                </div>
                <div class="nav-section-label">المالية</div>
                <div class="nav-item" onclick="navigate('payroll')"><span class="nav-icon">💰</span> مسير الرواتب</div>
                <div class="nav-item" onclick="navigate('calculator')"><span class="nav-icon">🧮</span> الآلة الحاسبة</div>
                <div class="nav-section-label">الإعدادات</div>
                <div class="nav-item" onclick="navigate('settings')"><span class="nav-icon">⚙️</span> إعدادات الشركة</div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">👤</div>
                    <div>
                        <div class="user-name" id="sidebar-user-email">مدير</div>
                        <div class="user-role" id="sidebar-user-role">Admin</div>
                    </div>
                    <button class="logout-btn" onclick="doLogout()" title="خروج">↩</button>
                </div>
            </div>
        </aside>

        <header class="header">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <div>
                <div class="header-title" id="header-title">لوحة التحكم</div>
                <div class="header-subtitle" id="header-subtitle">مرحباً بك</div>
            </div>
            <div class="header-spacer"></div>
            <div class="sub-badge" id="sub-badge">🔓 Trial</div>
            <button class="header-btn primary-btn" id="header-action-btn" style="display:none;">+ إجراء</button>
        </header>

        <main class="main">
            <div class="page active" id="page-dashboard"> </div>
            <div class="page" id="page-employees"> </div>
            <div class="page" id="page-attendance"> </div>
            <div class="page" id="page-leaves"> </div>
            <div class="page" id="page-payroll"> </div>
            <div class="page" id="page-calculator"> </div>
            <div class="page" id="page-settings"> </div>
        </main>
    </div>

    <div class="modal-overlay" id="modal-employee"> </div>
    <div class="modal-overlay" id="modal-emp-detail"> </div>
    <div class="modal-overlay" id="modal-att-day"> </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/employees.js"></script>
    <script src="js/payroll.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/leaves.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/pdf-gen.js"></script>

    <script>
        // كود التشغيل الأساسي
        window.addEventListener('load', () => {
            if (localStorage.getItem('pp_token')) {
                bootApp();
            }
        });
    </script>
</body>
</html>
