<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seday ERP - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: Cairo, sans-serif; overflow-x: hidden; }
        #sidebar { width: 60px; transition: 0.3s; overflow: hidden; }
        #sidebar:hover { width: 240px; }
        @media (max-width: 1023px) {
            #sidebar { width: 100% !important; height: 70px !important; bottom: 0 !important; top: auto !important; flex-direction: row !important; right:0; left:0; }
            main { margin-right: 0 !important; padding-bottom: 100px !important; }
        }
    </style>
</head>
<body class="bg-slate-50 flex min-h-screen">
    <div id="login-view" class="fixed inset-0 bg-slate-900 z-[300] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-md shadow-2xl text-center">
            <h2 class="text-3xl font-black text-slate-800 mb-6 uppercase">Seday ERP</h2>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold text-center">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold text-center">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg">Login 🔒</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="bg-slate-900 text-white fixed h-full right-0 top-0 z-[100] flex flex-col hidden">
        <nav class="flex-1">
            <div onclick="showDash()" class="p-5 hover:bg-indigo-600 cursor-pointer"><i class="fas fa-home ml-4"></i> الرئيسية</div>
            <div onclick="showHR()" class="p-5 hover:bg-indigo-600 cursor-pointer"><i class="fas fa-users ml-4"></i> الموظفين</div>
            <div onclick="showCalc()" class="p-5 hover:bg-emerald-600 cursor-pointer"><i class="fas fa-magic ml-4"></i> Net to Gross</div>
            <div onclick="handleLogout()" class="p-5 hover:bg-rose-600 cursor-pointer mt-auto"><i class="fas fa-power-off ml-4"></i> خروج</div>
        </nav>
    </aside>

    <main id="main-content" class="flex-1 lg:mr-[60px] p-4 md:p-8 hidden">
        <div id="dashboard-view">
            <h1 class="text-4xl font-black mb-10 italic">Dashboard</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="showHR()" class="bg-white p-8 rounded-3xl shadow hover:shadow-xl cursor-pointer transition">الموظفين</div>
                <div onclick="showCalc()" class="bg-white p-8 rounded-3xl shadow hover:shadow-xl cursor-pointer transition">حساب صافي</div>
            </div>
        </div>

        <div id="list-view" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">قائمة الموظفين</h2>
                <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black">+ إضافة</button>
            </div>
            <div class="bg-white rounded-3xl shadow overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-slate-50 border-b"><tr><th class="p-5">الاسم</th><th class="p-5">الإجراء</th></tr></thead>
                    <tbody id="empTable"></tbody>
                </table>
            </div>
        </div>

        <div id="profile-view" class="hidden">
             </div>

        <div id="net-gross-view" class="hidden">
            </div>
    </main>

    <script>
        let TOKEN = localStorage.getItem('token');

        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            const r = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const d = await r.json();
            if(d.token) { localStorage.setItem('token', d.token); location.reload(); }
            else alert("Error: " + (d.error || "Login Failed"));
        }

        function handleLogout() { localStorage.removeItem('token'); location.reload(); }

        // Initial check
        if(TOKEN) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }
    </script>
</body>
</html>
