<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll System | Payroll Team</title>
    <style>
        :root { --primary: #1a73e8; --success: #27ae60; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { color: var(--dark); margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: #fff; border: 1px solid #e1e4e8; padding: 20px; border-radius: 12px; position: relative; }
        .card h3 { color: var(--primary); margin-top: 0; border-right: 4px solid var(--primary); padding-right: 12px; margin-bottom: 20px; font-size: 1.2rem; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #444; text-align: left; direction: ltr; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
        .btn { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:hover { background: #219150; transform: translateY(-2px); }
        .results { margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; background: var(--dark); color: white; padding: 25px; border-radius: 12px; text-align: center; }
        .res-item { border-left: 1px solid #444; }
        .res-item:last-child { border-left: none; }
        .res-item span { display: block; font-size: 24px; color: #f1c40f; font-weight: 700; margin-top: 8px; }
        #status { font-size: 13px; color: var(--success); margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📊 نظام إدارة الرواتب المتكامل</h1>
        <p>Managed by Payroll Team</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>البيانات الأساسية</h3>
            <label>(الرقم القومي (14 رقم</label>
            <input type="text" id="nid" placeholder="أدخل الرقم القومي" onblur="checkHistory()">
            <span id="status"></span>
            <label>اسم الموظف</label>
            <input type="text" id="name" placeholder="اسم الموظف">
            <label>شهر الراتب</label>
            <input type="month" id="month">
        </div>

        <div class="card">
            <h3>الاستحقاقات (التعاقدية)</h3>
            <label>(Basic) الراتب الأساسي</label>
            <input type="number" id="basic" value="10000">
            <label>بدل انتقال / بدلات أخرى</label>
            <input type="number" id="trans" value="0">
            <label>عمولات / متغير</label>
            <input type="number" id="comm" value="0">
        </div>

        <div class="card">
            <h3>أيام العمل والتاريخ</h3>
            <label>عدد أيام العمل الفعلي</label>
            <input type="number" id="days" value="30">
            <label>(أيام سابقة (تراكمي</label>
            <input type="number" id="pDays" value="0" readonly style="background: #f8f9fa; color: #666;">
            <label>وعاء ضريبي سابق</label>
            <input type="number" id="pTaxable" value="0" readonly style="background: #f8f9fa; color: #666;">
            <input type="hidden" id="pTaxes" value="0">
        </div>
    </div>

    <button class="btn" onclick="processPayroll()">💾 حساب واعتماد الراتب</button>

    <div class="results">
        <div class="res-item">Gross Salary<span id="outG">0.00</span></div>
        <div class="res-item">Insurance<span id="outI">0.00</span></div>
        <div class="res-item">Income Tax<span id="outT">0.00</span></div>
        <div class="res-item">Martyrs Fund<span id="outM">0.00</span></div>
        <div class="res-item">NET SALARY<span id="outN">0.00</span></div>
    </div>
</div>

<script>
    async function checkHistory() {
        const id = document.getElementById('nid').value;
        if(id.length < 14) return;
        document.getElementById('status').innerText = "⏳ جاري فحص البيانات...";
        const res = await fetch(`/history/${id}`);
        const data = await res.json();
        if(data.found) {
            document.getElementById('name').value = data.name;
            document.getElementById('pDays').value = data.prevDays;
            document.getElementById('pTaxable').value = data.prevTaxable;
            document.getElementById('pTaxes').value = data.prevTaxes;
            document.getElementById('status').innerText = "✅ تم تحميل البيانات التراكمية بنجاح.";
        } else {
            document.getElementById('status').innerText = "🆕 موظف جديد.";
        }
    }

    async function processPayroll() {
        const data = {
            nationalId: document.getElementById('nid').value,
            name: document.getElementById('name').value,
            month: document.getElementById('month').value,
            basic: Number(document.getElementById('basic').value),
            transport: Number(document.getElementById('trans').value),
            comm: Number(document.getElementById('comm').value),
            days: Number(document.getElementById('days').value),
            prevDays: Number(document.getElementById('pDays').value),
            prevTaxable: Number(document.getElementById('pTaxable').value),
            prevTaxes: Number(document.getElementById('pTaxes').value)
        };
        const res = await fetch('/calculate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const r = await res.json();
        document.getElementById('outG').innerText = r.gross.toLocaleString();
        document.getElementById('outI').innerText = r.insurance.toLocaleString();
        document.getElementById('outT').innerText = r.tax.toLocaleString();
        document.getElementById('outM').innerText = r.martyrs.toLocaleString();
        document.getElementById('outN').innerText = r.net.toLocaleString();
        alert("تم الحساب والحفظ بنجاح!");
    }
</script>
</body>
</html>
